<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>FIELD</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@200;400;600&family=Unbounded:wght@200;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Single output surface -->
  <canvas id="stage"></canvas>

  <!-- Hidden video + low-res seg input -->
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="seg-in"></canvas>

  <!-- Control panel -->
  <nav id="panel">
    <header id="ph">
      <span class="logo">FIELD</span>
      <button id="pt">◂</button>
    </header>
    <div id="pb">

      <div class="row">
        <label>Live</label>
        <button class="tog on" id="b-anim" data-v="1">ON</button>
      </div>
      <div class="row">
        <label>Invert</label>
        <button class="tog" id="b-inv" data-v="0">OFF</button>
      </div>
      <div class="row stack">
        <label>Density <b id="v-den">40</b></label>
        <input type="range" id="s-den" min="10" max="120" value="40" />
      </div>
      <div class="row stack">
        <label>React <b id="v-rx">6</b></label>
        <input type="range" id="s-rx" min="1" max="12" value="6" />
      </div>
      <div class="row stack">
        <label>Size <b id="v-sz">14</b>px</label>
        <input type="range" id="s-sz" min="8" max="40" value="14" />
      </div>
      <div class="row stack">
        <label>Source</label>
        <select id="sel">
          <option value="signal">SIGNAL</option>
          <option value="body">BODY</option>
          <option value="code">CODE</option>
          <option value="void">VOID</option>
          <option value="glitch">GLITCH</option>
        </select>
      </div>
      <footer id="stat">
        <span>▸ <span id="fr">0</span> fps</span>
        <span>▸ seg <span id="sr">0</span> fps</span>
      </footer>
    </div>
  </nav>

  <!-- Boot veil -->
  <div id="veil">
    <div id="vring"></div>
    <p id="vmsg">INITIALISING FIELD</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
